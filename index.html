<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#173b72">
<title>ポケカ相場比較</title>
<style>
*{box-sizing:border-box}body{margin:0;background:#f4f7fb;color:#172033;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Sans","Yu Gothic",sans-serif}
header{padding:22px 16px;background:linear-gradient(135deg,#173b72,#315ea8);color:#fff}h1{margin:0;font-size:1.45rem}header p{margin:6px 0 0;opacity:.85}
main{max-width:850px;margin:auto;padding:14px}.card{background:#fff;border-radius:16px;padding:16px;margin-bottom:14px;box-shadow:0 5px 18px #182b4a12}
h2{font-size:1.08rem;margin:0 0 14px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:11px}
label{font-size:.86rem;font-weight:700;display:flex;flex-direction:column;gap:5px}input,select{font-size:16px;padding:11px;border:1px solid #ccd6e4;border-radius:10px;background:#fff}
button{border:0;border-radius:10px;background:#2d5dcc;color:#fff;padding:12px 15px;font-weight:800;font-size:15px;margin-top:13px}
.upload input{display:none}.upload span{display:block;padding:16px;border:2px dashed #9bb0d6;border-radius:12px;color:#2d5dcc;background:#f5f8ff;text-align:center}
#preview{display:none;width:120px;max-height:170px;object-fit:contain;margin:12px auto;border-radius:8px}
.result{display:grid;grid-template-columns:1fr 1fr;gap:10px}.result article{border:1px solid #dce4ef;border-radius:12px;padding:13px}
.result h3{margin:0 0 8px}.judge{margin-top:12px;padding:14px;border-radius:12px;background:#edf2fa;font-weight:800;line-height:1.55}.good{background:#e5f5e9;color:#17642d}.warn{background:#fff2d9;color:#765000}.bad{background:#fde8e8;color:#8b2020}
small{display:block;color:#68758a;margin-top:8px;line-height:1.55}.table{overflow:auto}table{width:100%;min-width:650px;border-collapse:collapse}th,td{padding:9px;border-bottom:1px solid #e5e9ef;text-align:left;font-size:.82rem}th{background:#f3f5f9}
.row{display:flex;gap:8px;flex-wrap:wrap}.secondary{background:#596a84}.danger{background:#a33e47}
@media(max-width:620px){.grid,.result{grid-template-columns:1fr}}
</style>
</head>
<body>
<header><h1>ポケカ国内・海外相場比較</h1><p>カード番号で識別し、利益を比較します</p></header>
<main>
<section class="card">
<h2>1. カード識別</h2>
<label class="upload"><input id="img" type="file" accept="image/*" capture="environment"><span>カードを撮影・画像を選択</span></label>
<img id="preview" alt="">
<div class="grid">
<label>カード名<input id="name" placeholder="例：レックウザVMAX"></label>
<label>カード番号<input id="number" placeholder="例：284/184"></label>
<label>セットコード<input id="set" placeholder="例：s8b"></label>
<label>レアリティ<input id="rarity" placeholder="例：UR"></label>
<label>状態<select id="condition"><option>未鑑定・美品</option><option>未鑑定・小傷あり</option><option>未鑑定・傷あり</option><option>PSA 10</option><option>PSA 9</option></select></label>
<label>管理ID<input id="uid" readonly></label>
</div>
<button id="make">管理IDを生成</button>
<small>セットコード＋カード番号＋レアリティで識別します。例：S8B-284-184-UR</small>
</section>

<section class="card">
<h2>2. 価格・費用</h2>
<div class="grid">
<label>仕入れ価格（円）<input id="buy" type="number" value="25000"></label>
<label>国内販売価格（円）<input id="jp" type="number" value="32000"></label>
<label>海外販売価格（現地通貨）<input id="foreign" type="number" step="0.01" value="220"></label>
<label>為替レート（1通貨＝円）<input id="fx" type="number" step="0.01" value="150"></label>
<label>国内手数料（%）<input id="jpfee" type="number" step="0.1" value="10"></label>
<label>海外手数料（%）<input id="intfee" type="number" step="0.1" value="15"></label>
<label>国内送料（円）<input id="jpship" type="number" value="230"></label>
<label>国際送料（円）<input id="intship" type="number" value="2500"></label>
<label>梱包・その他（円）<input id="other" type="number" value="200"></label>
</div>
<button id="calc">利益を比較</button>
</section>

<section class="card">
<h2>3. 結果</h2>
<div class="result">
<article><h3>国内販売</h3><p>利益：<strong id="jpprofit">-</strong></p><p>利益率：<strong id="jpmargin">-</strong></p></article>
<article><h3>海外販売</h3><p>利益：<strong id="intprofit">-</strong></p><p>利益率：<strong id="intmargin">-</strong></p></article>
</div>
<div id="judge" class="judge">入力後に「利益を比較」を押してください。</div>
<button id="save">履歴へ保存</button>
</section>

<section class="card">
<h2>4. 履歴</h2>
<div class="row"><button id="csv" class="secondary">CSV出力</button><button id="clear" class="danger">履歴削除</button></div>
<div class="table"><table><thead><tr><th>日時</th><th>管理ID</th><th>カード名</th><th>仕入れ</th><th>国内利益</th><th>海外利益</th><th>推奨</th></tr></thead><tbody id="history"></tbody></table></div>
<small>履歴はこのSafari内に保存されます。Safariのデータを消すと履歴も消えます。</small>
</section>
</main>
<script>
const $=id=>document.getElementById(id), n=id=>Number($(id).value||0);
const yen=v=>new Intl.NumberFormat('ja-JP',{style:'currency',currency:'JPY',maximumFractionDigits:0}).format(v);
const pct=v=>(v*100).toFixed(1)+'%';
let last=null;
function makeId(){const c=s=>String(s||'').trim().toUpperCase().replace(/[^A-Z0-9]+/g,'-').replace(/^-|-$/g,'');$('uid').value=[c($('set').value),c($('number').value),c($('rarity').value)].filter(Boolean).join('-')}
$('make').onclick=makeId;['set','number','rarity'].forEach(x=>$(x).oninput=makeId);
$('img').onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{$('preview').src=r.result;$('preview').style.display='block'};r.readAsDataURL(f)};
function calc(){makeId();const buy=n('buy'),jp=n('jp'),fr=n('foreign'),fx=n('fx'),other=n('other');const ir=fr*fx;
const jpP=jp-buy-jp*n('jpfee')/100-n('jpship')-other;const inP=ir-buy-ir*n('intfee')/100-n('intship')-other;
const jm=jp?jpP/jp:0,im=ir?inP/ir:0;$('jpprofit').textContent=yen(jpP);$('intprofit').textContent=yen(inP);$('jpmargin').textContent=pct(jm);$('intmargin').textContent=pct(im);
let rec,cls='judge';if(Math.max(jpP,inP)<=0){rec='見送り推奨：どちらも赤字です。';cls+=' bad'}else if(inP>jpP+1500){rec='海外販売推奨：国内より約'+yen(inP-jpP)+'高い利益です。';cls+=' good'}else if(jpP>inP+1500){rec='国内販売推奨：海外より約'+yen(jpP-inP)+'高い利益です。';cls+=' good'}else{rec='利益差が小さいため、手間と返品リスクの少ない国内販売を優先。';cls+=' warn'}
$('judge').className=cls;$('judge').textContent=rec;last={jpP,inP,rec};}
$('calc').onclick=calc;
const get=()=>JSON.parse(localStorage.getItem('pokeca-history')||'[]');const put=r=>{localStorage.setItem('pokeca-history',JSON.stringify(r));render()};
function render(){$('history').innerHTML=get().map(x=>`<tr><td>${x.date}</td><td>${x.uid||'-'}</td><td>${x.name||'-'}</td><td>${yen(x.buy)}</td><td>${yen(x.jpP)}</td><td>${yen(x.inP)}</td><td>${x.rec}</td></tr>`).join('')}
$('save').onclick=()=>{if(!last)calc();const r=get();r.unshift({date:new Date().toLocaleString('ja-JP'),uid:$('uid').value,name:$('name').value,buy:n('buy'),jpP:last.jpP,inP:last.inP,rec:last.rec});put(r.slice(0,300))}
$('clear').onclick=()=>{if(confirm('履歴を削除しますか？'))put([])}
$('csv').onclick=()=>{const rows=[['日時','管理ID','カード名','仕入れ価格','国内利益','海外利益','推奨'],...get().map(x=>[x.date,x.uid,x.name,x.buy,x.jpP,x.inP,x.rec])];const csv='\uFEFF'+rows.map(r=>r.map(v=>'"'+String(v??'').replace(/"/g,'""')+'"').join(',')).join('\n');const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download='pokeca_history.csv';a.click()}
$('name').value='レックウザVMAX';$('number').value='284/184';$('set').value='s8b';$('rarity').value='UR';makeId();calc();render();
</script>
</body>
</html>
