<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0f2747"><title>PokéTrade Ver.4</title>
<style>
:root{--navy:#0f2747;--blue:#2d67d7;--bg:#f3f6fb;--line:#dbe3ef;--muted:#66738a}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:#172033;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Sans","Yu Gothic",sans-serif}
header{position:sticky;top:0;z-index:5;background:linear-gradient(135deg,#0f2747,#24569f);color:#fff;padding:17px 14px 11px}
h1{font-size:1.3rem;margin:0}header p{font-size:.8rem;opacity:.82;margin:5px 0 0}
nav{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-top:11px}nav button{border:0;border-radius:9px;padding:9px;background:#ffffff1c;color:#fff;font-weight:800}nav button.active{background:#fff;color:#19498b}
main{max-width:850px;margin:auto;padding:13px}.view{display:none}.view.active{display:block}.card{background:#fff;border-radius:16px;padding:16px;margin-bottom:13px;box-shadow:0 5px 18px #16284612}
h2{font-size:1.05rem;margin:0 0 12px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
label{display:flex;flex-direction:column;gap:5px;font-size:.82rem;font-weight:750}input,select,textarea{width:100%;font:inherit;font-size:16px;padding:11px;border:1px solid #cbd6e6;border-radius:10px}
button,.fileBtn{border:0;border-radius:10px;padding:11px 13px;font-weight:800;margin:5px 4px 5px 0}.primary{background:var(--blue);color:#fff}.secondary{background:#5e6e87;color:#fff}.danger{background:#a63b46;color:#fff}.fileBtn{display:inline-block;background:#5e6e87;color:white}.fileBtn input{display:none}
.helper{font-size:.79rem;line-height:1.55;color:var(--muted)}.status{padding:12px;border-radius:11px;background:#edf2fa;margin:10px 0;font-weight:750}.ok{background:#e7f6ec;color:#17703a}.err{background:#fde8e9;color:#932d35}
.tableWrap{overflow:auto;border:1px solid var(--line);border-radius:12px;margin-top:10px}table{border-collapse:collapse;width:100%;min-width:650px}th,td{padding:9px;border-bottom:1px solid #e5eaf1;text-align:left;font-size:.78rem}th{background:#f4f6fa}
.candidates{max-height:240px;overflow:auto;border:1px solid var(--line);border-radius:10px;margin-top:6px}.candidate{display:block;width:100%;text-align:left;background:#fff;border:0;border-bottom:1px solid #edf0f5;border-radius:0;margin:0;padding:11px}.candidate:last-child{border-bottom:0}
@media(max-width:650px){.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<header><h1>PokéTrade Ver.4</h1><p>全カード辞書同期・カード登録・在庫管理</p>
<nav><button class="active" data-view="register">登録</button><button data-view="inventory">在庫</button><button data-view="settings">設定</button></nav></header>
<main>
<section id="register" class="view active">
<div class="card"><h2>カードを検索・登録</h2>
<label>カード名<input id="cardName" autocomplete="off" placeholder="例：ピカチュウ"></label>
<div id="candidateList" class="candidates" style="display:none"></div>
<div class="grid" style="margin-top:10px">
<label>カード番号<input id="cardNumber"></label><label>セットコード<input id="setCode"></label>
<label>レアリティ<input id="rarity"></label><label>状態<select id="condition"><option>未鑑定・美品</option><option>未鑑定・小傷あり</option><option>未鑑定・傷あり</option><option>PSA 10</option><option>PSA 9</option></select></label>
<label>仕入れ価格（円）<input id="purchasePrice" type="number" min="0"></label><label>仕入れ日<input id="purchaseDate" type="date"></label>
</div>
<label style="margin-top:10px">メモ<textarea id="memo"></textarea></label>
<button id="save" class="primary">在庫へ登録</button>
<p class="helper">最初に「設定」から全カード辞書を同期してください。同期後はカード名を2文字以上入力すると候補が表示されます。</p>
</div></section>

<section id="inventory" class="view"><div class="card"><h2>在庫一覧</h2>
<input id="searchInventory" placeholder="カード名・番号で検索">
<div class="tableWrap"><table><thead><tr><th>カード名</th><th>番号</th><th>セット</th><th>レアリティ</th><th>状態</th><th>仕入れ</th><th>操作</th></tr></thead><tbody id="inventoryBody"></tbody></table></div>
</div></section>

<section id="settings" class="view">
<div class="card"><h2>全カード辞書</h2>
<p class="helper">TCGdexの日本語カード一覧を取得し、カード名・番号・セットコードをSafari内に保存します。既存の手動登録カードは残して統合します。</p>
<button id="sync" class="primary">全カード辞書を同期</button>
<div id="syncStatus" class="status">未同期です。</div>
<p><strong id="dictCount">辞書：0件</strong></p>
<button id="exportDict" class="secondary">辞書をJSON出力</button>
<label class="fileBtn">辞書を読み込み<input id="importDict" type="file" accept=".json,application/json"></label>
</div>
<div class="card"><h2>バックアップ</h2>
<button id="exportAll" class="secondary">全データをバックアップ</button>
<label class="fileBtn">バックアップを復元<input id="importAll" type="file" accept=".json,application/json"></label>
</div>
</section>
</main>
<script>
const $=id=>document.getElementById(id);
const API='https://api.tcgdex.net/v2/ja/cards';
const store={get(k,d){try{return JSON.parse(localStorage.getItem(k))??d}catch{return d}},set(k,v){localStorage.setItem(k,JSON.stringify(v))}};
const norm=v=>String(v||'').trim().toLowerCase().replace(/\s+/g,'');
const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const today=()=>new Date().toISOString().slice(0,10);
$('purchaseDate').value=today();

document.querySelectorAll('nav button').forEach(b=>b.onclick=()=>{
 document.querySelectorAll('nav button').forEach(x=>x.classList.remove('active'));
 document.querySelectorAll('.view').forEach(x=>x.classList.remove('active'));
 b.classList.add('active');$(b.dataset.view).classList.add('active');
 if(b.dataset.view==='inventory')renderInventory();
 if(b.dataset.view==='settings')updateCount();
});

function catalog(){return store.get('pt-catalog',[])}
function saveCatalog(rows){store.set('pt-catalog',rows);updateCount()}
function inventory(){return store.get('pt-inventory',[])}
function saveInventory(rows){store.set('pt-inventory',rows)}

function updateCount(){$('dictCount').textContent='辞書：'+catalog().length.toLocaleString('ja-JP')+'件'}

$('cardName').oninput=()=>{
 const q=norm($('cardName').value), box=$('candidateList');
 if(q.length<2){box.style.display='none';box.innerHTML='';return}
 const m=catalog().filter(x=>norm(x.name).includes(q)).slice(0,80);
 box.innerHTML=m.length?m.map((x,i)=>`<button class="candidate" data-i="${i}"><strong>${esc(x.name)}</strong><br>${esc(x.setCode||'—')}｜${esc(x.number||'—')}｜${esc(x.rarity||'—')}</button>`).join(''):'<div class="helper" style="padding:12px">一致する候補がありません。</div>';
 box.style.display='block';
 box.querySelectorAll('.candidate').forEach((b,i)=>b.onclick=()=>{
   const x=m[i];$('cardName').value=x.name;$('cardNumber').value=x.number||'';$('setCode').value=x.setCode||'';$('rarity').value=x.rarity||'';box.style.display='none';
 });
};

$('save').onclick=()=>{
 const item={id:Date.now(),cardName:$('cardName').value.trim(),cardNumber:$('cardNumber').value.trim(),setCode:$('setCode').value.trim(),rarity:$('rarity').value.trim(),condition:$('condition').value,purchasePrice:Number($('purchasePrice').value||0),purchaseDate:$('purchaseDate').value,memo:$('memo').value.trim(),status:'stock',createdAt:new Date().toISOString()};
 if(!item.cardName){alert('カード名を入力してください。');return}
 const rows=inventory();rows.push(item);saveInventory(rows);alert('在庫へ登録しました。');
 ['cardName','cardNumber','setCode','rarity','purchasePrice','memo'].forEach(id=>$(id).value='');$('purchaseDate').value=today();
};

function renderInventory(){
 const q=norm($('searchInventory').value);
 const rows=inventory().filter(x=>!q||norm(x.cardName||x.name).includes(q)||norm(x.cardNumber||x.number).includes(q));
 $('inventoryBody').innerHTML=rows.length?rows.map(x=>`<tr><td>${esc(x.cardName||x.name)}</td><td>${esc(x.cardNumber||x.number)}</td><td>${esc(x.setCode)}</td><td>${esc(x.rarity)}</td><td>${esc(x.condition)}</td><td>¥${Number(x.purchasePrice||0).toLocaleString()}</td><td><button class="danger" onclick="removeItem(${x.id||0})">削除</button></td></tr>`).join(''):'<tr><td colspan="7">登録された在庫はありません。</td></tr>';
}
$('searchInventory').oninput=renderInventory;
window.removeItem=id=>{if(!confirm('削除しますか？'))return;saveInventory(inventory().filter((x,i)=>(x.id||i)!==id));renderInventory()};

$('sync').onclick=async()=>{
 $('sync').disabled=true;$('syncStatus').className='status';$('syncStatus').textContent='カード一覧を取得しています…';
 try{
  const res=await fetch(API,{cache:'no-store'});if(!res.ok)throw new Error('HTTP '+res.status);
  const data=await res.json();if(!Array.isArray(data))throw new Error('データ形式エラー');
  const fetched=data.map(x=>{const id=String(x.id||''),p=id.lastIndexOf('-');return{name:String(x.name||'').trim(),number:String(x.localId||'').trim(),setCode:p>0?id.slice(0,p):'',rarity:''}}).filter(x=>x.name&&x.number);
  const merged=[...catalog(),...fetched], seen=new Set(), unique=[];
  for(const x of merged){const k=(norm(x.name)+'|'+x.number+'|'+String(x.setCode).toLowerCase());if(!seen.has(k)){seen.add(k);unique.push(x)}}
  unique.sort((a,b)=>a.name.localeCompare(b.name,'ja')||String(a.setCode).localeCompare(String(b.setCode))||String(a.number).localeCompare(String(b.number),undefined,{numeric:true}));
  saveCatalog(unique);store.set('pt-catalog-sync',{at:new Date().toISOString(),count:unique.length});
  $('syncStatus').className='status ok';$('syncStatus').textContent=unique.length.toLocaleString('ja-JP')+'件を保存しました。';
 }catch(e){$('syncStatus').className='status err';$('syncStatus').textContent='同期できませんでした：'+e.message}
 finally{$('sync').disabled=false}
};

function download(data,name){const b=new Blob([data],{type:'application/json'}),a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000)}
$('exportDict').onclick=()=>download(JSON.stringify(catalog(),null,2),'poketrade_card_catalog.json');
$('importDict').onchange=e=>readJson(e.target.files[0],d=>{if(!Array.isArray(d))throw Error();saveCatalog(d.filter(x=>x&&x.name&&x.number));alert('辞書を読み込みました。')});
$('exportAll').onclick=()=>download(JSON.stringify({catalog:catalog(),inventory:inventory(),exportedAt:new Date().toISOString()},null,2),'poketrade_ver4_backup.json');
$('importAll').onchange=e=>readJson(e.target.files[0],d=>{if(d.catalog)saveCatalog(d.catalog);if(d.inventory)saveInventory(d.inventory);alert('復元しました。')});
function readJson(file,cb){if(!file)return;const r=new FileReader();r.onload=()=>{try{cb(JSON.parse(r.result))}catch{alert('JSONファイルを読み込めませんでした。')}};r.readAsText(file)}
updateCount();renderInventory();
</script>
</body></html>
